<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Matches Philosophy glass panel: .content-panel + prose wrapper bg-[rgba(0,0,0,0.7)] */
      .bg { fill: rgba(0, 0, 0, 0.7); }
      .orbit {
        fill: none;
        stroke: #f0a0c0;
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .axis {
        stroke: #f0a0c0;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .core {
        fill: #f0a0c0;
        stroke: none;
      }
      .core-ring {
        fill: none;
        stroke: #f0a0c0;
        stroke-width: 5;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="400" height="400"/>

  <!-- Horizontal rings (screen-space); match tilted radii -->
  <ellipse class="orbit" cx="200" cy="200" rx="120" ry="40"/>
  <ellipse class="orbit" cx="200" cy="200" rx="90" ry="30"/>

  <!-- Tilted orbits 30°; axis 15° -->
  <g transform="rotate(30 200 200)">
    <ellipse class="orbit" cx="200" cy="200" rx="120" ry="40"/>
    <ellipse class="orbit" cx="200" cy="200" rx="90" ry="30"/>
  </g>
  <g transform="rotate(15 200 200)">
    <line class="axis" x1="200" y1="55" x2="200" y2="345"/>
  </g>
  <circle class="core-ring" cx="200" cy="200" r="18"/>
  <circle class="core" cx="200" cy="200" r="8"/>
</svg>
