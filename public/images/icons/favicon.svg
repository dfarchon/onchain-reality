<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="coreGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: match site #0a0a0a with rounded corners -->
  <rect width="512" height="512" rx="96" ry="96" fill="#0a0a0a"/>

  <!-- Horizontal orbit ring -->
  <ellipse cx="256" cy="256" rx="168" ry="56"
    fill="none" stroke="#f0a0c0" stroke-width="16"
    stroke-linecap="round"/>

  <!-- Tilted orbit ring (30°) -->
  <ellipse cx="256" cy="256" rx="168" ry="56"
    fill="none" stroke="#f0a0c0" stroke-width="16"
    stroke-linecap="round"
    transform="rotate(30 256 256)"/>

  <!-- Axis line (15°) -->
  <line x1="256" y1="68" x2="256" y2="444"
    stroke="#f0a0c0" stroke-width="18"
    stroke-linecap="round"
    transform="rotate(15 256 256)"/>

  <!-- Core ring -->
  <circle cx="256" cy="256" r="30"
    fill="none" stroke="#f0a0c0" stroke-width="16"/>

  <!-- Core dot with glow -->
  <g filter="url(#coreGlow)">
    <circle cx="256" cy="256" r="14" fill="#f0a0c0"/>
  </g>
</svg>
